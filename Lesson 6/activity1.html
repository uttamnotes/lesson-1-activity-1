<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>School Club Registration</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>

    <h1>School Club Registration</h1>

    <form>

        <label>Student Name</label><br>
        <input type="text" id="studentName"><br><br>

        <label>School Email</label><br>
        <input type="text" id="schoolEmail"><br><br>

        <label>Membership Code (Hidden)</label><br>
        <input type="password" id="memberCode"><br><br>

        <label>Select Your Grade</label><br>
        <input type="radio" id="grade5" name="grade" value="Grade 5">
        Grade 5<br>

        <input type="radio" id="grade6" name="grade" value="Grade 6">
        Grade 6<br><br>

        <label>Choose Club Activities</label><br>
        <input type="checkbox" id="activity1" value="Art Club">
        Art Club<br>

        <input type="checkbox" id="activity2" value="Science Club">
        Science Club<br><br>

        <input type="submit" value="Register">

    </form>

</body>

</html>
