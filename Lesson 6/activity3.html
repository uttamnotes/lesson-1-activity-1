<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Student Score Tracker</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>

    <fieldset>
        <legend><b>Student Performance Summary</b></legend>

        <form oninput="avg.value=(parseInt(s1.value)+parseInt(s2.value)+parseInt(s3.value)+parseInt(s4.value))/4">

            <label>Activity Name</label><br>
            <input type="text" id="activity"><br><br>

            <label>Student 1 Score</label><br>
            <input type="number" id="s1"><br><br>

            <label>Student 2 Score</label><br>
            <input type="number" id="s2"><br><br>

            <label>Student 3 Score</label><br>
            <input type="number" id="s3"><br><br>

            <label>Student 4 Score</label><br>
            <input type="number" id="s4"><br><br>

            Class Average:
            <output name="avg" for="s1 s2 s3 s4"></output>

        </form>
    </fieldset>

</body>

</html>
